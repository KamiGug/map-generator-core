skip_lfs: true

pre-commit:
  commands:
    check:
      run: task -s lint
    todos:
      run: |
        task -s todos
        git add todos.txt

pre-push:
  commands:
    test:
      run: |
        msg=$(git log -1 --pretty=%s)
        branch=$(git rev-parse --abbrev-ref HEAD)
        scope=$(echo "$msg" | sed -nE 's/^[a-zA-Z]+\(([^)]+)\):.*/\1/p' | tr '[:upper:]' '[:lower:]')
         if [[ "$branch" != "master" && "$scope" == "wip" ]]; then
          exit 0
        fi
        echo "Running tests..."
        task -s test

commit-msg:
  commands:
    commitlint:
      run: |
        if grep -qE "^(Merge|Revert) " {1}; then
          exit 0
        fi
        commitlint --edit {1}
